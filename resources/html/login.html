<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ID Gen Login</title>
  <link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="card">

   <div class="logo"> <img src="../images/logo.png" alt="ID Card Generator Logo"> </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Access your ID Card Generator account</p>

      <form>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="name@company.com">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>

        <button class="submit-btn" type="submit">Login to Dashboard <i class="fa-solid fa-arrow-right"></i> </button>

      </form>

    </div>
  </div>

</body>
</html>
